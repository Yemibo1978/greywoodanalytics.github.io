document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

0px; margin:0 0 64px; line-height:1.8;\">Spreadsheets that nobody fully understands. SAS programmes built by analysts who left years ago. Access databases with no documentation. Legacy reports that feed regulatory returns — and no record of how they work.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:{{ problemGridCols }}; gap:1px; background:rgba(201,168,76,0.18);\">\n        <sc-for list=\"{{ problemCards }}\" as=\"card\" hint-placeholder-count=\"4\">\n          <div style=\"background:#12163C; padding:36px 28px;\">\n            <div style=\"font-family:'Newsreader',serif; font-size:32px; font-style:italic; font-weight:500; color:#C9A84C; margin-bottom:16px;\">{{ card.num }}<\u002Fdiv>\n            <h3 style=\"font-family:'Public Sans',sans-serif; font-weight:600; font-size:15px; color:#F8F5EC; margin:0 0 12px; letter-spacing:0.2px;\">{{ card.title }}<\u002Fh3>\n            <p style=\"font-size:13.5px; color:rgba(243,238,223,0.55); line-height:1.7; margin:0;\">{{ card.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- SOLUTION -->\n  <section id=\"solution\" style=\"background:#FBFAF7; padding:{{ sectionPadding }};\">\n    <div style=\"max-width:960px; margin:0 auto;\">\n      <p style=\"font-family:'Public Sans',sans-serif; font-size:11.5px; font-weight:600; letter-spacing:3.5px; text-transform:uppercase; color:#9C8130; margin:0 0 24px;\">Our Solution<\u002Fp>\n      <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:{{ sectionTitleSize }}; line-height:1.2; margin:0 0 20px; color:#1A1F4E; text-wrap:balance;\">Structured EUC Deconstruction.<\u002Fh2>\n      <p style=\"font-size:16.5px; color:#5B6270; max-width:640px; margin:0 0 64px; line-height:1.8;\">We systematically analyse your legacy data assets and produce structured, audit-ready documentation. Every engagement follows a three-stage methodology.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:{{ stageGridCols }}; gap:0; margin-bottom:56px; border:1px solid #E4DFD3;\">\n        <sc-for list=\"{{ stages }}\" as=\"stage\" hint-placeholder-count=\"3\">\n          <div style=\"padding:40px 32px; border-left:{{ stage.borderLeft }}; border-top:{{ stage.borderTop }};\">\n            <p style=\"font-family:'Public Sans',sans-serif; font-size:10.5px; font-weight:600; letter-spacing:2.5px; color:#C9A84C; text-transform:uppercase; margin:0 0 16px;\">{{ stage.tag }}<\u002Fp>\n            <h3 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:20px; color:#1A1F4E; margin:0 0 16px; line-height:1.3;\">{{ stage.title }}<\u002Fh3>\n            <p style=\"font-size:13.5px; color:#6B7280; line-height:1.75; margin:0;\">{{ stage.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#1A1F4E; padding:36px 40px; display:flex; align-items:center; gap:28px; flex-wrap:wrap;\">\n        <div style=\"font-family:'Newsreader',serif; font-style:italic; font-size:44px; font-weight:500; color:#C9A84C; line-height:1;\">2–3<\u002Fdiv>\n        <div>\n          <p style=\"font-family:'Public Sans',sans-serif; font-weight:600; font-size:14px; color:#F8F5EC; margin:0 0 4px; letter-spacing:0.3px;\">Working days to first deliverable pack<\u002Fp>\n          <p style=\"font-size:13px; color:rgba(243,238,223,0.55); margin:0;\">Structured methodology compresses discovery without cutting corners.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DELIVERABLES -->\n  <section id=\"deliverables\" style=\"background:#FFFFFF; padding:{{ sectionPadding }};\">\n    <div style=\"max-width:960px; margin:0 auto;\">\n      <p style=\"font-family:'Public Sans',sans-serif; font-size:11.5px; font-weight:600; letter-spacing:3.5px; text-transform:uppercase; color:#9C8130; margin:0 0 24px;\">What You Receive<\u002Fp>\n      <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:{{ sectionTitleSize }}; line-height:1.2; margin:0 0 20px; color:#1A1F4E; text-wrap:balance;\">Five audit-ready deliverables. One per engagement stage.<\u002Fh2>\n      <p style=\"font-size:16.5px; color:#5B6270; max-width:640px; margin:0 0 56px; line-height:1.8;\">Every deliverable is structured for a specific audience — so the right people get the right information at every stage of your programme.<\u002Fp>\n      <div style=\"display:flex; flex-direction:column; border-top:1px solid #E4DFD3;\">\n        <sc-for list=\"{{ deliverables }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <div style=\"display:grid; grid-template-columns:{{ deliverableGridCols }}; align-items:center; border-bottom:1px solid #E4DFD3; padding:28px 0; gap:20px;\">\n            <div style=\"font-family:'Newsreader',serif; font-style:italic; font-weight:500; font-size:26px; color:#C9A84C; text-align:center;\">{{ item.num }}<\u002Fdiv>\n            <div>\n              <h3 style=\"font-family:'Public Sans',sans-serif; font-weight:600; font-size:15.5px; color:#1A1F4E; margin:0 0 6px; letter-spacing:0.2px;\">{{ item.title }}<\u002Fh3>\n              <p style=\"font-size:13.5px; color:#6B7280; line-height:1.6; margin:0;\">{{ item.body }}<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"display:{{ formatColDisplay }}; text-align:right; white-space:nowrap;\">\n              <span style=\"display:inline-block; font-size:11px; font-weight:600; color:#9C8130; border:1px solid #C9A84C; padding:4px 12px; letter-spacing:0.6px;\">{{ item.format }}<\u002Fspan>\n              <span style=\"display:block; font-size:11.5px; color:#9AA0AC; margin-top:8px; font-style:italic;\">{{ item.audience }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY -->\n  <section id=\"why\" style=\"background:#FBFAF7; padding:{{ sectionPadding }};\">\n    <div style=\"max-width:960px; margin:0 auto;\">\n      <p style=\"font-family:'Public Sans',sans-serif; font-size:11.5px; font-weight:600; letter-spacing:3.5px; text-transform:uppercase; color:#9C8130; margin:0 0 24px;\">Why Greywood Analytics<\u002Fp>\n      <h2 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:{{ sectionTitleSize }}; line-height:1.2; margin:0 0 20px; color:#1A1F4E; text-wrap:balance;\">What makes a specialist boutique different.<\u002Fh2>\n      <p style=\"font-size:16.5px; color:#5B6270; max-width:640px; margin:0 0 56px; line-height:1.8;\">We are not a generalist consulting firm. We do one thing, for organisations where getting it wrong has real consequences.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:{{ whyGridCols }}; gap:1px; background:#E4DFD3;\">\n        <sc-for list=\"{{ whyCards }}\" as=\"card\" hint-placeholder-count=\"6\">\n          <div style=\"background:#FBFAF7; padding:36px 32px;\">\n            <div style=\"width:32px; height:2px; background:#C9A84C; margin-bottom:20px;\"><\u002Fdiv>\n            <h3 style=\"font-family:'Newsreader',serif; font-weight:500; font-size:17px; color:#1A1F4E; margin:0 0 14px; line-height:1.35;\">{{ card.title }}<\u002Fh3>\n            <p style=\"font-size:13.5px; color:#6B7280; line-height:1.75; margin:0;\">{{ card.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CONTACT -->\n  <section id=\"contact\" style=\"background:#1A1F4E; text-align:center; padding:{{ sectionPadding }}; position:relative; overflow:hidden;\">\n    <div style=\"position:absolute; top:0; left:50%; width:640px; height:640px; border:1px solid rgba(201,168,76,0.1); border-radius:50%; transform:translate(-50%,-55%);\"><\u002Fdiv>\n    <div style=\"max-width:640px; margin:0 auto; position:relative;\">\n      <p style=\"font-family:'Public Sans',sans-serif; font-size:11.5px; font-weight:600; letter-spacing:3.5px; text-transform:uppercase; color:#C9A84C; margin:0 0 24px;\">Get in Touch<\u002Fp>\n      <h2 style=\"font-family:'Newsreader',serif; font-style:italic; font-weight:500; font-size:{{ sectionTitleSize }}; color:#F8F5EC; margin:0 0 24px; line-height:1.25;\">Ready to talk?<\u002Fh2>\n      <p style=\"color:rgba(243,238,223,0.62); font-size:16px; margin:0 auto 48px; line-height:1.8;\">Every engagement begins with a no-commitment scoping conversation. Tell us about your migration programme and the assets in scope — we will respond within one working day.<\u002Fp>\n      <p style=\\"font-size:16px; color:rgba(243,238,223,0.85); margin:24px 0 0;\\">To start a conversation, email us directly at <a href=\\"mailto:yemi.michael@greywoodanalytics.com\\" style=\\"color:#C9A84C; font-weight:600;\\">yemi.michael@greywoodanalytics.com<\\u002Fa><\\u002F\n      <div style=\"width:40px; height:1px; background:rgba(201,168,76,0.4); margin:48px auto;\"><\u002Fdiv>\n      <a href=\"mailto:yemi.michael@greywoodanalytics.com\" style=\"font-family:'Newsreader',serif; font-style:italic; font-weight:500; font-size:21px; color:#C9A84C; text-decoration:none; display:block; margin-bottom:10px;\" style-hover=\"color:#E8D5A3;\">yemi.michael@greywoodanalytics.com<\u002Fa>\n      <p style=\"font-size:13.5px; color:rgba(243,238,223,0.4); margin:0;\">greywoodanalytics.com<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#0F1230; padding:28px 40px; text-align:center;\">\n    <p style=\"font-size:12px; color:rgba(243,238,223,0.35); margin:0; letter-spacing:0.3px;\">© 2025 Greywood Analytics · EUC Deconstruction for Financial Services · <a href=\"mailto:yemi.michael@greywoodanalytics.com\" style=\"color:rgba(201,168,76,0.6);\">yemi.michael@greywoodanalytics.com<\u002Fa><\u002Fp>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    width: typeof window !== 'undefined' ? window.innerWidth : 1200,\n    mobileMenuOpen: false,\n  };\n\n  componentDidMount() {\n    this._onResize = () => this.setState({ width: window.innerWidth });\n    window.addEventListener('resize', this._onResize);\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  renderVals() {\n    const w = this.state.width;\n    const mobile = w < 640;\n    const tablet = w < 900;\n    const navMobile = w < 1180;\n\n    const problemCards = [\n      { num: '01', title: 'Migration Delays', body: 'Discovery work that should happen before migration happens during it — at full programme cost.' },\n      { num: '02', title: 'Regulatory Exposure', body: \"Legacy assets feeding regulatory returns carry undocumented assumptions. 'The spreadsheet calculates it' is not an answer to a regulator.\" },\n      { num: '03', title: 'Audit Findings', body: 'SS1/23, BCBS 239, and FCA Consumer Duty create obligations that undocumented assets routinely fail to meet.' },\n      { num: '04', title: 'Silent Errors', body: 'Migrating an undocumented asset means migrating its errors. They are harder to find and harder to fix on the other side.' },\n    ];\n\n    const stagesRaw = [\n      { tag: 'Stage 1', title: 'Plain English Summary', body: 'What does this asset do? Who uses it? What does it produce and who receives the output? Written for a Board member, a project sponsor, and a migration lead simultaneously.' },\n      { tag: 'Stage 2', title: 'Dependency Mapping', body: 'What connects to what? Where are the formula chains, the data flows, the fragile linkages? What breaks if something changes — and will you know about it?' },\n      { tag: 'Stage 3', title: 'Risk & Assumption Register', body: 'What are the risks? What assumptions drive the outputs? What governance gaps exist? Structured for Risk, Audit, and Compliance with full regulatory citations.' },\n    ];\n    const stages = stagesRaw.map((s, i) => ({\n      ...s,\n      borderLeft: (!tablet && i > 0) ? '1px solid #E4DFD3' : 'none',\n      borderTop: (tablet && i > 0) ? '1px solid #E4DFD3' : 'none',\n    }));\n\n    const deliverablesRaw = [\n      { num: '01', title: 'Plain English Summary', body: 'What the asset does, what it produces, who receives the output, and what the key concerns are for migration.', format: 'Word', audience: 'Project Sponsor · Migration Lead · BA' },\n      { num: '02', title: 'Dependency Map', body: 'Every significant data flow, formula chain, and cross-system dependency — with fragility ratings and change impact assessments.', format: 'Excel', audience: 'Technical Analyst · Data Engineer' },\n      { num: '03', title: 'Dependency Mapping Narrative', body: 'The written analysis behind the dependency map — covering the single point of failure, silent failure modes, and pre-migration actions.', format: 'Word', audience: 'Migration Lead · BA' },\n      { num: '04', title: 'Risk & Assumption Narrative', body: 'A formal risk assessment with regulatory citations — every identified risk, governance gap, and undocumented assumption, rated and actionable.', format: 'Word', audience: 'Risk Team · Audit · Compliance · CFO' },\n      { num: '05', title: 'Risk Register', body: 'A complete, filterable risk register with risks, assumptions, governance gaps, and a prioritised remediation plan — structured for immediate use.', format: 'Excel', audience: 'Risk Team · Programme Manager' },\n    ];\n\n    const whyCards = [\n      { title: 'Financial Services domain knowledge', body: '10+ years working inside Financial Services and Utilities. We understand IFRS 9, regulatory reporting, model governance, and SS1/23 — not as frameworks to reference, but as environments we have worked in.' },\n      { title: 'Speed without sacrificing rigour', body: 'What a traditional internal team would take 6–9 days to produce, Greywood Analytics delivers in 2–3 working days. Our structured methodology compresses discovery and documentation without cutting corners.' },\n      { title: 'Audit-ready from the start', body: 'Every finding is cited to a specific cell, formula, comment, or programme section. Our outputs do not need to be converted into audit evidence. They are audit evidence.' },\n      { title: 'Regulatory framing built in', body: 'Governance gaps are cited against the specific regulation they breach — SS1/23, IFRS 9, BCBS 239, FCA Consumer Duty — making outputs immediately actionable for compliance teams.' },\n      { title: 'Fixed scope. Clear deliverables.', body: 'Every engagement is scoped before work begins. You know exactly what you are receiving, for which assets, by when. No scope creep. No open-ended retainers.' },\n      { title: 'All legacy asset types', body: 'Excel workbooks, SAS programmes, Access databases, flat files, legacy reports. Whatever form your undocumented assets take, our methodology applies.' },\n    ];\n\n    return {\n      navPadding: mobile ? '16px 20px' : '20px 48px',\n      navListDisplay: navMobile ? 'none' : 'flex',\n      hamburgerDisplay: navMobile ? 'flex' : 'none',\n      mobileMenuOpen: this.state.mobileMenuOpen,\n      toggleMenu: () => this.setState(s => ({ mobileMenuOpen: !s.mobileMenuOpen })),\n      closeMenu: () => this.setState({ mobileMenuOpen: false }),\n\n      heroPadding: mobile ? '88px 20px 72px' : '140px 48px 120px',\n      heroTitleSize: mobile ? '32px' : (tablet ? '38px' : '48px'),\n      heroTaglineSize: mobile ? '16px' : '18px',\n      heroGridCols: tablet ? '1fr' : '1.05fr 0.95fr',\n      heroGridGap: tablet ? '56px' : '64px',\n      heroTextAlign: tablet ? 'center' : 'left',\n      heroRuleMargin: tablet ? '0 auto 28px' : '0 0 28px',\n      heroImageHeight: mobile ? '320px' : (tablet ? '380px' : '480px'),\n\n      sectionPadding: mobile ? '64px 20px' : '128px 48px',\n      sectionTitleSize: mobile ? '26px' : (tablet ? '32px' : '40px'),\n      statementSize: mobile ? '24px' : '32px',\n\n      problemGridCols: mobile ? '1fr' : (tablet ? 'repeat(2, 1fr)' : 'repeat(4, 1fr)'),\n      stageGridCols: tablet ? '1fr' : 'repeat(3, 1fr)',\n      whyGridCols: mobile ? '1fr' : (tablet ? 'repeat(2, 1fr)' : 'repeat(3, 1fr)'),\n\n      deliverableGridCols: mobile ? '40px 1fr' : '48px 1fr auto',\n      formatColDisplay: mobile ? 'none' : 'block',\n\n      problemCards,\n      stages,\n      deliverables: deliverablesRaw,\n      whyCards,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
